<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RFID Factory Dashboard</title>

<style>
  body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: white;
    text-align: center;
  }

  header {
    background: #1e293b;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
  }

  .container {
    padding: 20px;
  }

  input {
    padding: 10px;
    width: 250px;
    border-radius: 5px;
    border: none;
  }

  button {
    padding: 10px 15px;
    margin-left: 10px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
  }

  .card {
    margin: 20px auto;
    padding: 20px;
    width: 320px;
    border-radius: 10px;
    background: #1e293b;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }

  .GOOD {
    color: lime;
    font-size: 20px;
    font-weight: bold;
  }

  .BAD {
    color: red;
    font-size: 20px;
    font-weight: bold;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
  }

  .box {
    background: #334155;
    padding: 15px;
    border-radius: 10px;
    width: 120px;
  }

  .title {
    margin-top: 20px;
    font-size: 18px;
  }
</style>

</head>

<body>

<header>🏭 RFID Factory Traceability System</header>

<div class="container">

  <h3>Search Product</h3>

  <input type="text" id="uid" placeholder="Enter RFID UID">
  <button onclick="searchProduct()">Search</button>

  <div class="title">Live Production Stats</div>

  <div class="stats">
    <div class="box">
      GOOD<br>
      <span id="goodCount">0</span>
    </div>

    <div class="box">
      BAD<br>
      <span id="badCount">0</span>
    </div>
  </div>

  <div id="result"></div>

</div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  // 🔥 YOUR FIREBASE CONFIG (replace this)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "mini-projet-embarque.firebaseapp.com",
    databaseURL: "https://mini-projet-embarque-default-rtdb.firebaseio.com",
    projectId: "mini-projet-embarque"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // 🔍 SEARCH PRODUCT
  function searchProduct() {
    let uid = document.getElementById("uid").value.toUpperCase();

    db.ref("/products/" + uid).once("value", (snapshot) => {
      let data = snapshot.val();

      let result = document.getElementById("result");

      if (data) {
        result.innerHTML = `
          <div class="card">
            <h2>Product: ${uid}</h2>
            <div class="${data.status}">Status: ${data.status}</div>
            <p>Station: ${data.station}</p>
          </div>
        `;
      } else {
        result.innerHTML = `
          <div class="card">
            ❌ Product not found
          </div>
        `;
      }
    });
  }

  // 📊 LIVE COUNTERS
  db.ref("products").on("value", (snapshot) => {
    let data = snapshot.val();

    let good = 0;
    let bad = 0;

    for (let id in data) {
      if (data[id].status === "GOOD") good++;
      if (data[id].status === "BAD") bad++;
    }

    document.getElementById("goodCount").innerText = good;
    document.getElementById("badCount").innerText = bad;
  });

</script>

</body>
</html>
